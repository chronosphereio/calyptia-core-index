version: "2"

run:
  timeout: 5m
  tests: false

formatters:
  enable:
    - gofumpt

linters:
  default: none
  enable:
    - bodyclose
    - dupl
    - errcheck
    - forcetypeassert
    - funlen
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - misspell
    - mnd
    - noctx
    - nolintlint
    - revive
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - tparallel
    - unconvert
    - unparam
    - unused
    - whitespace

  settings:
    gocyclo:
      min-complexity: 15
    gocognit:
      min-complexity: 40
    goconst:
      min-occurrences: 20
    funlen:
      lines: 75
      statements: 50
    misspell:
      locale: US
    mnd:
      ignored-numbers:
        - "2"
        - "10"
        - "32"
        - "64"
    nolintlint:
      allow-unused: false
      require-explanation: true
      require-specific: false
    revive:
      rules:
        - name: exported
          disabled: true

  exclusions:
    rules:
      - linters:
          - bodyclose
        text: "response body must be closed"
