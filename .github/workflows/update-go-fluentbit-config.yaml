name: Update go-fluentbit-config schema

on:
    push:
        branches: [main]
        paths: ["schemas/**"]
    workflow_dispatch:

jobs:
    update_go_fluentbit_config:
        # Skip when the triggering push is a calyptia release cascade: in that case the
        # calyptia-core-fluent-bit production-release.yaml owns the go-fluentbit-config schema PR
        # directly (job `pr-cascade-go-fluentbit-config`), minting the reviewer-App approval from its
        # private context. The `[skip-schema-cascade]` sentinel is injected into that cascade's
        # core-index merge commit. Non-release schema changes (manual edits, update-core-fb-schemas
        # dispatch) have no sentinel and still cascade reactively here. On workflow_dispatch
        # head_commit is null, so the guard is a no-op and manual runs proceed.
        if: ${{ !contains(github.event.head_commit.message, '[skip-schema-cascade]') }}
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout to go-fluentbit-config repository.
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  repository: chronosphereio/calyptia-go-fluentbit-config
                  path: go-fluentbit-config
                  token: ${{ secrets.CALYPTIA_CI_PAT }}

            - name: Checkout to core-images-index repository.
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  path: core-images-index

            - name: Copy schemas from core-images-index to go-fluentbit-config.
              run: |
                  export OUTPUT_DIR="$PWD/go-fluentbit-config"
                  core-images-index/scripts/copy-schemas-to-go-fluentbit-config.sh
              shell: bash

            - name: Create PR on go-fluentbit-config repository.
              id: cpr
              uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
              with:
                  token: ${{ secrets.CALYPTIA_CI_PAT }}
                  title: "Update schema to latest"
                  branch: "update-latest-schema"
                  delete-branch: true
                  signoff: true
                  branch-suffix: short-commit-hash
                  commit-message: "Update schema to latest"
                  body: |
                      Update schema after push on index repo.

                      - Created by ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
                      - Auto-generated by create-pull-request: https://github.com/peter-evans/create-pull-request
                  draft: false
                  path: |
                      go-fluentbit-config/
                  labels: ci,automerge

            - name: Check outputs
              if: ${{ steps.cpr.outputs.pull-request-number }}
              run: |
                echo "Pull Request Number - ${{ steps.cpr.outputs.pull-request-number }}"
                echo "Pull Request URL - ${{ steps.cpr.outputs.pull-request-url }}"
              shell: bash

            - name: Enable Pull Request Automerge
              if: ${{ steps.cpr.outputs.pull-request-number }}
              run: gh pr merge --squash --auto "${{ steps.cpr.outputs.pull-request-number }}"
              working-directory: go-fluentbit-config
              env:
                GH_TOKEN: ${{ secrets.CALYPTIA_CI_PAT }}
